<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>加载......歪瞳 | Minecraft末地要塞定位计算器 - 精准查找传送门坐标 (无需指令/两点定位法)</title><style>body {margin: 0;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;background-color: #f0f2f5;color: #333;overflow-x: hidden;}#loading-screen {position: fixed;top: 0;left: 0;width: 100%;height: 100%;background-color: #111;z-index: 99999;display: flex;justify-content: center;align-items: center;flex-direction: column;transition: opacity 0.8s ease-out;}.loader-ring {display: inline-block;position: relative;width: 64px;height: 64px;}.loader-ring div{box-sizing: border-box;display: block;position: absolute;width: 51px;height: 51px;margin: 6px;border: 6px solid #fff;border-radius: 50%;animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;border-color: #00d2ff transparent transparent transparent; /* Cloudflare 风格的青色 */}.loader-ring div:nth-child(1) { animation-delay: -0.45s; }.loader-ring div:nth-child(2) { animation-delay: -0.3s; }.loader-ring div:nth-child(3) { animation-delay: -0.15s; }@keyframes lds-ring {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}.loading-text {margin-top: 20px;color: #888;font-family: 'Courier New', Courier, monospace;font-size: 12px;letter-spacing: 2px;}</style></head><body style="margin:0; opacity: 1; transition: opacity 0.8s ease-out;"><div id="loading-screen"><div class="loader-ring"><div></div><div></div><div></div><div></div></div><div class="loading-text">正在加载资源...</div></div><script>window.addEventListener('message', function(event) {if (event.data === 'hide-loader') {document.body.style.opacity = '0';}});</script></body></html>
